spring.application.name=demo

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:bustransport
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server Configuration
server.port=8080

# Comma-separated patterns for allowed frontend origins (supports wildcards)
app.cors.allowed-origin-patterns=https://bus-transport-mugesh-frontend-b4emfjcrc8gkhqhu.southeastasia-01.azurewebsites.net,http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*
